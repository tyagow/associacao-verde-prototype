<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Compare A / B / C — Comando</title>
    <link rel="stylesheet" href="_tokens.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: var(--paper-warm);
      }
      header.bar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 16px;
        background: var(--paper);
        border-bottom: 1px solid var(--line);
      }
      header.bar h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 600;
      }
      header.bar a {
        font-size: 13px;
        color: var(--green-deep);
        font-weight: 600;
      }
      .row {
        display: flex;
        min-width: 4200px;
      }
      .col {
        flex: 0 0 1380px;
        border-right: 1px solid var(--line);
        height: calc(100vh - 50px);
        position: relative;
      }
      .col:last-child {
        border-right: 0;
      }
      .col label {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 5;
        background: var(--ink);
        color: var(--paper);
        font-size: 11px;
        padding: 3px 8px;
        border-radius: var(--r-sm);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <a href="index.html">← voltar</a>
      <h1>Comando · A / B / C lado a lado</h1>
      <span style="color: var(--muted); font-size: 12px">Scrolle horizontal para alternar</span>
    </header>
    <div class="row">
      <div class="col"><label>A · Linear Mono</label><iframe src="a-comando.html"></iframe></div>
      <div class="col">
        <label>B · Stripe Workbench</label><iframe src="b-comando.html"></iframe>
      </div>
      <div class="col"><label>C · Retool Cockpit</label><iframe src="c-comando.html"></iframe></div>
    </div>
  </body>
</html>
