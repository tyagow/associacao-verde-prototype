name: Production CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify production app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install browser verifier dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Syntax checks
        run: npm run check

      - name: Unit and integration tests
        run: npm test

      - name: Isolated production smoke and browser E2E
        run: LOG_EVIDENCE_REF=github-actions-isolated-verification npm run verify:isolated

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-e2e
          path: artifacts/visual-e2e/
          if-no-files-found: ignore
